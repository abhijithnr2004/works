<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>food-card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card-image-container">
            <img src="./images//Tomato-Avocado-Toast-FI-1200x1200-1.jpg" alt="" class="card-image">
        </div>
        <div class="card-header">
            <span class="meal-type-text">BREAKFAST</span><br><br>
            <span class="meal-name-text">Smashed Avacod Toast</span>
        </div>
        <hr>    
        <div class="card-footer">
            
            <h4><span for="" class="calorie-digit-text">340 </span><span for="">kcal</span></h4><h4><span for="" class="time-text">Today, 8:30 AM</span></h4>
        </div>
    </div>
</body>
</html>
